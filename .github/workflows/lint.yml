name: Lint Files

# This workflow lints the nextapp directory
# And will trigger on push to *any* branch except main
on:
  push:
    branches-ignore:
      - main

jobs:
  lint-client:
    name: Lint Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Use NodeJS v24.11.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.11.0

      - name: Install Dependencies and Lint
        run: |
          cd nextapp
          npm install
          npm run lint
